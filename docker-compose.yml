services:
  mongodb:
    image: mongo:7
    container_name: closiq-discord-agent-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: closiq-discord-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: closiq-discord-agent-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: closiq
      MINIO_ROOT_PASSWORD: closiq-password-change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mongodb_data:
  qdrant_data:
  minio_data:
